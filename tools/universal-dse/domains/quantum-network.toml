# ============================================================
# Compatibility Rules
# ============================================================

# SPDC crystal is the standard for E91 protocol
[[rule]]
type = "prefer"
if_level = 0
if_id = "SPDC_Crystal"
then_level = 3
then_ids = "E91,TF_QKD"

# Satellite QKD channel needs trusted node or 2nd-gen repeater
[[rule]]
type = "prefer"
if_level = 1
if_id = "Satellite_QKD"
then_level = 2
then_ids = "TrustedNode,SecondGen"

# Si photonic source pairs with hollow-core fiber
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiPh_Integrated"
then_level = 1
then_ids = "Hollow_Core,SMF_Fiber"

# 3rd-gen repeater pairs with all-photonic sources
[[rule]]
type = "prefer"
if_level = 2
if_id = "ThirdGen"
then_level = 0
then_ids = "SiPh_Integrated,QDot_Source"

# Full quantum internet needs 2nd or 3rd gen repeaters
[[rule]]
type = "prefer"
if_level = 4
if_id = "Q_Internet"
then_level = 2
then_ids = "SecondGen,ThirdGen"

# Underwater quantum channel pairs with quantum sensing
[[rule]]
type = "prefer"
if_level = 1
if_id = "Underwater_Q"
then_level = 4
then_ids = "QSensor_Net"

# MDI-QKD protocol works best with multi-core fiber
[[rule]]
type = "prefer"
if_level = 3
if_id = "MDI_QKD"
then_level = 1
then_ids = "MCF_Fiber,Hollow_Core"
