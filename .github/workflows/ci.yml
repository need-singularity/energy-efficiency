# ═══════════════════════════════════════════════════════════════
# CDO Troubleshooting:
#   .shared/ 심링크는 폐기됨 (TECS-L 흡수 완료, n6-architecture 단일 통합).
#   CI 에서 .shared/ 내용에 의존하지 말 것.
#   CDO JSON 검증은 인라인 Python 사용.
# ═══════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Python syntax check + tests ──────────────────────
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install pytest numpy 2>/dev/null || pip install pytest

      - name: py_compile (syntax check)
        run: |
          exitcode=0
          for f in tools/*.py techniques/*.py engine/*.py *.py; do
            if [ -f "$f" ]; then
              python3 -m py_compile "$f" || exitcode=1
            fi
          done
          exit $exitcode

      - name: pytest (unit tests)
        run: |
          if compgen -G "tests/test_*.py" > /dev/null 2>&1; then
            python3 -m pytest tests/ -q --tb=short
          else
            echo "No test files in tests/ — skipping pytest"
          fi

  # ── Job 2: Rust cargo check + test ──────────────────────────
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/nexus/target
          key: cargo-${{ runner.os }}-${{ hashFiles('tools/nexus/Cargo.lock', 'tools/nexus/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cargo check
        run: cd tools/nexus && cargo check

      - name: Cargo test
        run: cd tools/nexus && cargo test

  # ── Job 3b: Stage A preflight — shared constants generator-clean + flatten ──
  # Stage A consolidation (proposals/dup_derivation_consolidation_phase2_2026_04_24.md).
  # Fails if n6shared/_shared_constants.hexa drifts from atlas/n6_core_constants.hexa,
  # or if any of the Stage-A-migrated verify files fail `flatten_imports` preflight.
  n6-shared-constants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generator-clean check (atlas SSOT vs n6shared/_shared_constants.hexa)
        run: |
          bash scripts/gen_shared_constants.sh --check

      - name: Flatten-preflight — Stage A migrated verify files
        # hexa-lang toolchain is not provisioned on the runner; we use the pure-python
        # fallback (scripts/flatten_imports_py.py) which has the same `use` resolution
        # contract. This validates that every migrated file flattens cleanly.
        run: |
          set -e
          MIGRATED=(
            domains/cognitive/brain-computer-interface/verify_brain-computer-interface.hexa
            domains/energy/room-temp-sc/tabletop-fusion-verify.hexa
            domains/physics/millennium-riemann/verify_millennium-riemann.hexa
          )
          for f in "${MIGRATED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"; exit 1
            fi
            out=$(mktemp --suffix=.hexa)
            python3 scripts/flatten_imports_py.py "$f" "$out"
            # Sanity: the flattened file must contain the SSOT block.
            grep -q "let SIGMA = 12" "$out" || { echo "FAIL: SSOT block not inlined in $f"; exit 1; }
            grep -q "let sigma = SIGMA" "$out" || { echo "FAIL: lowercase aliases not inlined in $f"; exit 1; }
          done
          echo "[n6-shared-constants] flatten preflight OK on ${#MIGRATED[@]} files"

  # ── Job 3: CDO JSON validation ──────────────────────────────
  cdo-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CDO JSON structure
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          CDO_REQUIRED = {"_meta"}  # minimum CDO field

          errors = []
          json_files = glob.glob("n6shared/**/*.json", recursive=True) + \
                       glob.glob("experiments/**/*.json", recursive=True)

          if not json_files:
              print("No JSON files found to validate")
              sys.exit(0)

          for path in sorted(json_files):
              try:
                  with open(path) as f:
                      data = json.load(f)
              except json.JSONDecodeError as e:
                  errors.append(f"  INVALID JSON: {path} ({e})")
                  continue

              if not isinstance(data, dict):
                  continue  # arrays are OK, skip CDO check

              # CDO check: if file has _meta, validate its structure
              if "_meta" in data:
                  meta = data["_meta"]
                  if not isinstance(meta, dict):
                      errors.append(f"  BAD _meta (not dict): {path}")
                  elif "description" not in meta:
                      errors.append(f"  _meta missing 'description': {path}")
                  print(f"  OK (CDO): {path}")
              else:
                  print(f"  OK (plain): {path}")

          if errors:
              print("\nCDO validation errors:")
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print(f"\nAll {len(json_files)} JSON files valid.")
          PYEOF
