name: NEXUS-6 CI
on:
  push:
    paths: ['tools/nexus6/**']
  pull_request:
    paths: ['tools/nexus6/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cd tools/nexus6 && cargo check
      - name: Test
        run: cd tools/nexus6 && cargo test
