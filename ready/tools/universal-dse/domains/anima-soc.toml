honeypot_decoys    = "6 = n"
kafka_partitions   = "6 = n"
egyptian_split     = "1/2 + 1/3 + 1/6 = 1"
flink_windows      = "4 = tau(6)"
sedi_lenses        = "4 = tau(6)"
mitre_tactics      = "12 = sigma(6)"
ueba_baseline_dims = "6 = n"
playbook_cats      = "6 = n"
homeo_setpoint     = "1 = mu(6)"
microzones         = "12 = sigma(6)"
anima_law_clusters = "5 = sopfr(6) = 2+3"
zerotrust_dims     = "6 = n"
risk_factors       = "12 = sigma(6)"
