# =============================================================
# Compatibility Rules
# =============================================================

# LLMTriage requires KafkaN6 or StreamFlink (high throughput ingest)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "LLMTriage"
then_level = 1
then_ids   = "KafkaN6,StreamFlink"

# SEDI_4Lens requires VectorDB or KafkaN6 (rich ingestion)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SEDI_4Lens"
then_level = 1
then_ids   = "VectorDB,KafkaN6"

# HomeoAuto incompatible with ManualSOC (auto clashes with manual)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "HomeoAuto"
then_level = 3
then_ids   = "ManualSOC"

# DeceptionShift requires Honeypot6 or DeceptionFull
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DeceptionShift"
then_level = 0
then_ids   = "Honeypot6,DeceptionFull"

# Anima79 requires TensionField or SEDI_4Lens (needs 79 law diagnostics)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Anima79"
then_level = 2
then_ids   = "TensionField,SEDI_4Lens"

# ZeroTrustSeg requires ZeroTrustGov (policy needs governance)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ZeroTrustSeg"
then_level = 4
then_ids   = "ZeroTrustGov"

# =============================================================
# n=6 Formulas
# =============================================================
[n6_formulas]
event_classes      = "6 = n"
kernel_hooks       = "4 = tau(6)"
