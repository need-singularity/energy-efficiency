# =============================================================
# Compatibility Rules
# =============================================================

[[rule]]
type       = "require"
if_level   = 0
if_id      = "HexN6_Natural"
then_level = 1
then_ids   = "SixFrameN6,NucMgmt"

[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "AfricanizedHybrid"
then_level = 3
then_ids   = "HomeoClimate"

[[rule]]
type       = "require"
if_level   = 2
if_id      = "CameraML"
then_level = 3
then_ids   = "IPM_N6"

[[rule]]
type       = "require"
if_level   = 3
if_id      = "HomeoClimate"
then_level = 2
then_ids   = "Thermal4D,HexSensorN6"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LogHive"
then_level = 2
then_ids   = "CameraML,Thermal4D"

[[rule]]
type       = "require"
if_level   = 4
if_id      = "Mead_N6"
then_level = 4
then_ids   = "HoneyN6"

# =============================================================
# n=6 Formulas
# =============================================================
[n6_formulas]
hex_sides            = "6 = n (natural 40M years)"
