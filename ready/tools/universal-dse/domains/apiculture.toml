# =============================================================
# APICULTURE DSE Domain Definition
# 양봉 — 벌집 육각 구조(n=6) 본래부터 n=6 자연 패턴
# n=6 기반 양봉: Hive → Colony → Sensor → Health → Yield
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "apiculture"
desc = "Apiculture DSE — Hexagonal Hive (natural n=6) + IoT Health Monitor + CCD Prevention"
levels = ["Hive", "Colony", "Sensor", "Health", "Yield"]
vision = "자연 n=6 육각구조 증폭 — 벌집은 이미 n=6 완전수 최적 구조. IoT로 CCD 방지."

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

