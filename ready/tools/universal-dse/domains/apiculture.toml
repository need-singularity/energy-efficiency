thermal_zones        = "4 = tau(6)"
rfid_readers         = "6 = n"
ipm_layers           = "6 = n"
probiotic_strains    = "12 = sigma(6)"
homeo_setpoint       = "1 = mu(6)"
harvests_per_year    = "6 = n"
pollination_crops    = "12 = sigma(6)"
mead_stages          = "6 = n"
