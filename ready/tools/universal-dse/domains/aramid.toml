# =============================================================
# Compatibility Rules
# =============================================================

[[rule]]
type       = "require"
if_level   = 0
if_id      = "PPDA_N6"
then_level = 0
then_ids   = "TPC_Chloride"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "PBO_Zylon"
then_level = 3
then_ids   = "UVStabilize_none"

[[rule]]
type       = "require"
if_level   = 0
if_id      = "PBO_Zylon"
then_level = 3
then_ids   = "UVStabilize"

[[rule]]
type       = "require"
if_level   = 2
if_id      = "LiquidCrystal"
then_level = 1
then_ids   = "LowTempSol_N6,SolidState"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "MPDA_Nomex"
then_level = 4
then_ids   = "BallisticN6"

[[rule]]
type       = "require"
if_level   = 4
if_id      = "FirefighterSuit"
then_level = 0
then_ids   = "MPDA_Nomex,PBI_Heat"

[[rule]]
type       = "require"
if_level   = 4
if_id      = "CompositeHexPly"
then_level = 3
then_ids   = "Resin_Impregn,SurfaceTreat"

# =============================================================
# n=6 Formulas
# =============================================================
[n6_formulas]
benzene_ring       = "6 = n (para-phenylene diamine carbon count)"
pbi_nitrogens      = "4 = tau(6)"
polymer_stages     = "6 = n"
interfacial_phases = "2 = phi(6)"
melt_stages        = "4 = tau(6)"
solid_state_hours  = "12 = sigma(6)"
mw_power_levels    = "5 = sopfr(6) = 2+3"
spinneret_holes    = "6 = n multiplier"
lc_orientation     = "12 = sigma(6)"
wet_baths          = "4 = tau(6)"
gel_draw_ratios    = "6 = n"
heat_draw_zones    = "6 = n"
crosslink_sites    = "4 = tau(6)"
plasma_gases       = "5 = sopfr(6)"
anneal_hours       = "12 = sigma(6)"
uv_additives       = "6 = n"
ballistic_layers   = "6 = n"
firefighter_layers = "4 = tau(6)"
rope_strands       = "12 = sigma(6)"
hex_ply_orient     = "6 = n (0/60/120/180/240/300 deg)"
