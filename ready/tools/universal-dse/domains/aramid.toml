# =============================================================
# ARAMID DSE Domain Definition
# 아라미드(케블라/Nomex) 고성능 섬유 — 모노머 + 중합 + 방사 + 후처리 + 제품
# n=6 기반 아라미드: Monomer → Polymerize → Spin → PostProcess → Product
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "aramid"
desc = "Aramid Fiber DSE — Kevlar/Nomex + Phenyl Ring (n=6 benzene) + Spin + Armor"
levels = ["Monomer", "Polymerize", "Spin", "PostProcess", "Product"]
vision = "n=6 벤젠 링 구조 극대화 — para-aramid sigma=12 수소결합, tau=4 방사 단계"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

