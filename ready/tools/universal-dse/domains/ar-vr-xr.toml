# =============================================================
# Compatibility Rules
# =============================================================

[[rule]]
type       = "require"
if_level   = 1
if_id      = "Foveated_N6"
then_level = 2
then_ids   = "EyeTracking"

[[rule]]
type       = "require"
if_level   = 0
if_id      = "Holographic"
then_level = 1
then_ids   = "PathTracing,NeRF_Dynamic"

[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "OutsideIn"
then_level = 4
then_ids   = "MetaverseSocial"

[[rule]]
type       = "require"
if_level   = 3
if_id      = "HapticN6"
then_level = 2
then_ids   = "HandN6"

[[rule]]
type       = "require"
if_level   = 4
if_id      = "GaussianSplat"
then_level = 1
then_ids   = "HexaTileN6,Foveated_N6"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LaserRetina"
then_level = 3
then_ids   = "Omnidirectional"

# =============================================================
# n=6 Formulas
# =============================================================
[n6_formulas]
subpixel_modes    = "6 = n"
driver_lanes      = "12 = sigma(6)"
wavefront_layers  = "4 = tau(6)"
viewpoints        = "6 = n"
resolution_levels = "6 = n"
nerf_mlp_layers   = "12 = sigma(6)"
raster_passes     = "4 = tau(6)"
path_bounces      = "5 = sopfr(6) = 2+3"
render_tiles      = "6 = n"
slam_feature_maps = "6 = n"
body_joints       = "12 = sigma(6)"
outside_bases     = "4 = tau(6)"
hand_dof          = "6 = n"
haptic_actuators  = "6 = n"
haptic_layers     = "4 = tau(6)"
gesture_classes   = "12 = sigma(6)"
direction_sensors = "6 = n"
usd_schema_dims   = "6 = n"
gaussian_attrs    = "12 = sigma(6)"
procedural_rules  = "6 = n"
avatar_rig_tiers  = "5 = sopfr(6)"
