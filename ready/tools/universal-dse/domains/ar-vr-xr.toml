# =============================================================
# AR-VR-XR DSE Domain Definition
# 확장 현실 — 디스플레이 + 렌더 + 추적 + 상호작용 + 컨텐츠
# n=6 기반 XR: Display → Render → Tracking → Interaction → Content
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "ar-vr-xr"
desc = "AR/VR/XR DSE — Micro-LED + Foveated Render + 6DoF Tracking + Haptic Glove"
levels = ["Display", "Render", "Tracking", "Interaction", "Content"]
vision = "n=6 기반 XR — sigma=12 DoF 전신 추적, phi=2 스테레오, tau=4 햅틱 계층"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

