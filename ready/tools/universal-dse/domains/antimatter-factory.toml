# =============================================================
# Compatibility Rules
# =============================================================

[[rule]]
type       = "require"
if_level   = 1
if_id      = "MuonCollider"
then_level = 0
then_ids   = "H_minus_RFQ,LinacSRF_src"

[[rule]]
type       = "require"
if_level   = 3
if_id      = "BECTrap"
then_level = 4
then_ids   = "AntiHbyN6"

[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Graphite"
then_level = 1
then_ids   = "MuonCollider"

[[rule]]
type       = "require"
if_level   = 4
if_id      = "PennTrapStack"
then_level = 3
then_ids   = "Penning_N6,CombinedPenningPaul"

[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "SolidH_Bed"
then_level = 3
then_ids   = "PaulTrap,OpticalTrap"

[[rule]]
type       = "require"
if_level   = 1
if_id      = "PlasmaWake"
then_level = 0
then_ids   = "LaserIon"

# =============================================================
# n=6 Formulas
# =============================================================
[n6_formulas]
rfq_electrode_modes  = "6 = n"
ecr_ionization       = "5 = sopfr(6) = 2+3"
