# =============================================================
# ANTIMATTER-FACTORY DSE Domain Definition
# 반물질 생산 공장 — 양성자 가속 + 타겟 충돌 + 포획 + 저장 + 응용
# n=6 기반 반물질 생산: Source → Accelerator → Target → Trap → Storage
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# NOTE: 장기 기술 (20~50년), SF 요소 배제 (다이슨/반물질 촉매 등 금지)
# =============================================================

[meta]
name = "antimatter-factory"
desc = "Antimatter Production Factory DSE (proton→target→trap, long-term 20-50y)"
levels = ["Source", "Accelerator", "Target", "Trap", "Storage"]
vision = "n=6 기반 반양성자/반수소 생산 — Penning trap + 자기 병 저장"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

